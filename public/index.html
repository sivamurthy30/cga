<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="description" content="DEVA — AI-powered career guidance for developers" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to font origins for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Inter — loaded with font-display:swap so text renders immediately
      using system font while Inter downloads in the background.
      This is the same technique Apple uses on apple.com.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Critical CSS hint — tell browser to prioritise main stylesheet -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />

    <title>DEVA — Career Development</title>

    <!--
      Inline critical CSS: sets background immediately so there's no
      white flash before React hydrates. Matches DesignSystem.css defaults.
    -->
    <style>
      html { background: #ffffff; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #ffffff;
        color: #1d1d1f;
      }
      /* Dark mode critical CSS — applied before JS loads */
      @media (prefers-color-scheme: dark) {
        html, body { background: #000000; color: #f5f5f7; }
      }
      /* Prevent layout shift from scrollbar appearing */
      html { scrollbar-gutter: stable; }
      /* Hide root until React renders to avoid FOUC */
      #root { min-height: 100vh; }
    </style>
    <!-- Razorpay Standard Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
